version: "3.9"

services:
  backend:
    build:
      context: ./backend
    container_name: ai-news-pipeline-demo-backend
    ports:
      - "8000:8000"
    environment:
      DEMO_CORS_ORIGINS: "http://localhost:5174,http://localhost:5173,http://localhost:8080"

  frontend:
    build:
      context: ./frontend
    container_name: ai-news-pipeline-demo-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"
